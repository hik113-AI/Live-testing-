name: TEDUH crawler (4x daily)

on:
  schedule:
    # 4 runs per day at 01, 07, 13, 19 UTC (09:00 / 15:00 / 21:00 / 03:00 MYT)
    - cron: '0 1 * * *'
    - cron: '0 7 * * *'
    - cron: '0 13 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      batch:
        description: 'Override batch number (0–3). Leave blank to auto-detect from hour.'
        required: false
        default: ''

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Cache CLIP model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: clip-vit-base-patch32

      - name: Install Python dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu --quiet
          pip install -r requirements.txt --quiet

      - name: Determine batch number
        id: batch
        run: |
          if [ -n "${{ github.event.inputs.batch }}" ]; then
            BATCH="${{ github.event.inputs.batch }}"
          else
            BATCH=$(( $(date -u +%-H) / 6 ))
          fi
          echo "BATCH=$BATCH" >> $GITHUB_OUTPUT
          echo "Running batch $BATCH of 4"

      # Listing refresh runs once per day on batch 0 to pick up new projects.
      - name: Refresh project listing (batch 0 only)
        if: steps.batch.outputs.BATCH == '0'
        continue-on-error: true
        timeout-minutes: 8
        run: python3 fetch_teduh.py

      - name: Run TEDUH detail crawler
        run: python3 fetch_teduh_daily.py --batch ${{ steps.batch.outputs.BATCH }} --of 4

      - name: Regenerate map_data.json
        run: python3 generate_map_data.py

      - name: Extract brochure images for new projects
        continue-on-error: true
        timeout-minutes: 55
        run: python3 extract_brochures.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          git reset --mixed origin/main
          git add teduh_projects.json teduh_history.json map_data.json b/
          git diff --cached --quiet || git commit -m "TEDUH crawl batch ${{ steps.batch.outputs.BATCH }}/4: $(date -u +%Y-%m-%dT%H:00Z)"
          git push
