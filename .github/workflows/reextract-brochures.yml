name: Re-extract all brochure images

# Triggered manually from the GitHub Actions tab — no local machine needed.
# Use this when the image selection algorithm has been updated and you want
# to reprocess all existing b/ images with CLIP ML scoring.

on:
  workflow_dispatch:

jobs:
  reextract:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Cache CLIP model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: clip-vit-base-patch32

      - name: Install Python dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu --quiet
          pip install -r requirements.txt --quiet

      - name: Re-extract all brochure images with CLIP
        run: python3 extract_brochures.py --reextract

      - name: Commit updated images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          git reset --mixed origin/main
          git add b/
          git diff --cached --quiet || git commit -m "chore: re-extract brochure images with CLIP ML scoring"
          git push
